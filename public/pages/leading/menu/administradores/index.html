<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Recursos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #e9eef3;
            width: 800px;
            height: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(#1f4e79, #2f75b5);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
            height: calc(100% - 60px);
            overflow: auto;
        }

        /* PANEL IZQUIERDO */
        .panel {
            width: 250px;
            background: #d9e3f0;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .panel h3 {
            margin: 10px 0;
            font-size: 14px;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #999;
            background: linear-gradient(#f5f5f5, #dcdcdc);
            cursor: pointer;
            border-radius: 4px;
        }

        .btn:hover {
            background: #cfd8dc;
        }

        /* PANEL DERECHO */
        .content {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 4px;
        }

        .top-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .year-box {
            background: #eef3fb;
            padding: 10px;
            border: 1px solid #ccc;
            width: 120px;
            text-align: center;
        }

        /* MODAL estilo FoxPro */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border: 2px solid #333;
            text-align: center;
            width: 300px;
        }

        .modal-buttons {
            margin-top: 15px;
        }

        .modal-buttons button {
            padding: 5px 15px;
            margin: 0 5px;
            border: 1px solid #555;
            cursor: pointer;
        }

        .yes {
            background: #4caf50;
            color: white;
        }

        .no {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>

    <div class="header">
        ADMINISTRACIÓN DE RECURSOS
    </div>

    <div class="container">

        <!-- PANEL IZQUIERDO -->
        <div class="panel">
            <h3>CIERRE DE GESTIÓN</h3>
            <button class="btn">Cerrar Gestión</button>
            <button class="btn">Cambiar Gestión</button>

            <h3>OPCIONES</h3>
            <button class="btn">Importar / Exportar</button>
            <button class="btn">Índices UFV</button>
            <button class="btn">Seguridad</button>
            <button class="btn">Re-indexar</button>
            <button class="btn">Migrador</button>
        </div>

        <!-- PANEL DERECHO -->
        <form id="adminForm" class="content">

            <div class="top-box">
                <div class="year-box">
                    <strong>2013</strong>
                </div>
            </div>

            <div class="field">
                <label>Número de partida presupuestaria</label>
                <input id="numero_partida" type="text" placeholder="Ejemplo: 11700">
            </div>

            <div class="field">
                <label>Año de gestión</label>
                <input id="anio_gestion" type="text" placeholder="Ejemplo: 2026">
            </div>

            <button type="submit" class="btn" style="width:150px;">Registrar</button>

        </form>
    </div>

    <!-- MODAL tipo FoxPro -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <p>¿Es usted el único usuario del sistema?</p>
            <div class="modal-buttons">
                <button type="button" class="yes" onclick="confirmarEnvio()">Sí</button>
                <button type="button" class="no" onclick="closeModal()">No</button>
            </div>
        </div>
    </div>

    <script src="../../../../js/crud_admin.js"></script>
    <script src="../../../../js/iframe-resize.js"></script>
    <script src="../../../../js/modal-close.js"></script>

</body>

</html>
