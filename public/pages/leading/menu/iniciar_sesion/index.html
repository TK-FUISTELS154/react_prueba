<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
     <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <div class="login-container">
            <h2>INGRESE SU IDENTIFICACION</h2>
            <div class="login-header">
                <img src="../../../../assets/img/login.png" alt="login">
            </div>
            <div class="login-main">
                <div class="login-inputs">
                    <div class="login-title">
                        <h3>Login</h3>
                        <h2 style="color: #4b9fff; font-weight: 900;"><strong>——————————————————————</strong></h2>
                    </div>
                    <div class="login-user">
                        <p>Nombre del Usuario</p>
                        <input id="login-username" type="text" placeholder="Usuario">
                    </div>
                    <div class="login-password">
                        <p>Contraseña</p>
                        <input id="login-password" type="password" placeholder="Contraseña">
                    </div>
                    <div class="login-confirm">
                        <p><strong>Nota: Es sensible al contexto</strong></p>
                        <button id="login-confirm">Aceptar</button>
                    </div>
                </div>
            </div>
            <div class="login-footer">
                <p>vSIAF versión 3.2</p>
                <p>Copyright &copy; 1999-2013 DGSGIF</p>
                <p>Todos los derechos reservados</p>
            </div>
        </div>  
    </main>
    <script src="../../../../assets/dataBase/user.js"></script>
    <script src="js/login.js"></script>
    <script src="../../../../js/config.js"></script>
    <script src="../../../../js/iframe-resize.js"></script>
</body>
</html>
